name: Build APK Android 13+

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (minSdk 33)
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK arm64
        run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64 --split-per-abi

      - name: Build APK universal
        run: flutter build apk --release --no-tree-shake-icons

      - name: List APKs
        run: find build/app/outputs -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK arm64
        uses: actions/upload-artifact@v4
        with:
          name: DebtTrackerPro-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK universal
        uses: actions/upload-artifact@v4
        with:
          name: DebtTrackerPro-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Debt Tracker Pro v1.0.${{ github.run_number }}"
          body: APK Android 13+ pret. Installer app-arm64-v8a-release.apk
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
